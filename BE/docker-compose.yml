services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: irms-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_ERLANG_COOKIE: "irms_secret_cookie_123"
    networks:
      - irms-network

  ordering-service:
    image: eclipse-temurin:21-jdk-jammy
    container_name: irms-ordering-service
    ports:
      - "8082:8082"
    volumes:
      - ./ordering_service:/app
      - maven-cache:/root/.m2
    working_dir: /app
    command: sh mvnw spring-boot:run
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SERVER_PORT=8082
    depends_on:
      - rabbitmq
    networks:
      - irms-network

  auth-service:
    image: eclipse-temurin:21-jdk-jammy
    container_name: irms-auth-service
    ports:
      - "8083:8083"
    volumes:
      - ./auth_service:/app
      - maven-cache:/root/.m2
    working_dir: /app
    command: ./mvnw spring-boot:run
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SERVER_PORT=8083
    depends_on:
      - rabbitmq
    networks:
      - irms-network
  
  inventory-service:
    image: eclipse-temurin:21-jdk-jammy
    container_name: irms-inventory-service
    ports:
      - "8084:8084"
    volumes:
      - ./inventory_service:/app
      - maven-cache:/root/.m2
    working_dir: /app
    command: ./mvnw spring-boot:run
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SERVER_PORT=8084
    depends_on:
      - rabbitmq
    networks:
      - irms-network

  gateway:
    image: eclipse-temurin:21-jdk-jammy
    container_name: irms-gateway
    ports:
      - "8081:8081"
    volumes:
      - ./gateway:/app
      - maven-cache:/root/.m2
    working_dir: /app
    command: sh mvnw spring-boot:run
    environment:
      - SERVER_PORT=8081
    depends_on:
      - auth-service
      - ordering-service
      - inventory-service
    networks:
      - irms-network

networks:
  irms-network:
    driver: bridge

volumes:
  maven-cache:
