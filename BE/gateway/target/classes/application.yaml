server:
  port: 8081

jwt:
  secret: mySecretKeyForJwtTokenGenerationWhichIsLongEnough

spring:
  cloud:
    gateway:
      routes:
        - id: ordering-service
          uri: http://ordering-service:8082
          predicates:
            - Path=/orders/**
          filters:
            - StripPrefix=1
        - id: auth-service
          uri: http://auth-service:8083
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        - id: inventory-service
          uri:  http://inventory-service:8084
          predicates:
            - Path=/inventory/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://payment-service:8085
          predicates:
            - Path=/payment/**
          filters:
            - StripPrefix=1
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
            allowedHeaders: "*"

management:
  endpoints:
    web:
      exposure:
        include: health,info